name: Preview

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      PREVIEW_WORKER_NAME: pagescms-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ env.PREVIEW_WORKER_NAME }} --var "BASE_URL:https://${{ env.PREVIEW_WORKER_NAME }}.${{ secrets.CLOUDFLARE_WORKERS_DEV_SUBDOMAIN }}.workers.dev"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PREVIEW_WORKER_NAME: ${{ env.PREVIEW_WORKER_NAME }}
        with:
          script: |
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const workerName = process.env.PREVIEW_WORKER_NAME;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## Preview deployment',
              '',
              `**URL:** ${deploymentUrl}`,
              `**Worker:** \`${workerName}\``,
              `**Commit:** \`${sha}\``,
              '',
              '_Updated on each push to this PR._',
            ].join('\n');

            const marker = '<!-- pagescms-preview-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
