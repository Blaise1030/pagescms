name: Preview

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy:
    if: startsWith(github.head_ref, 'feature/')
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      preview-alias: pr-${{ github.event.pull_request.number }}
      widget-worker-name: pagescms-widget-pr-${{ github.event.pull_request.number }}
      environment: preview

  comment:
    if: startsWith(github.head_ref, 'feature/')
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment-url }}
          WIDGET_URL: ${{ needs.deploy.outputs.widget-deployment-url }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
          WIDGET_WORKER_NAME: pagescms-widget-pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const widgetUrl = process.env.WIDGET_URL;
            const previewAlias = process.env.PREVIEW_ALIAS;
            const widgetWorkerName = process.env.WIDGET_WORKER_NAME;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## Preview deployment',
              '',
              `**CMS URL:** ${deploymentUrl}`,
              `**Preview alias:** \`${previewAlias}\` (on \`pagescms-staging\`)`,
              `**Widget script:** ${widgetUrl}`,
              `**Widget worker:** \`${widgetWorkerName}\``,
              `**Commit:** \`${sha}\``,
              '',
              '_Updated on each push to this PR._',
            ].join('\n');

            const marker = '<!-- pagescms-preview-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
