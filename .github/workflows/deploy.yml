name: Deploy

on:
  workflow_call:
    inputs:
      preview-alias:
        type: string
        default: ''
      widget-worker-name:
        type: string
        default: ''
      staging-deploy:
        type: boolean
        default: false
      run-migrations:
        type: boolean
        default: false
      environment:
        type: string
        default: ''
    outputs:
      deployment-url:
        description: Cloudflare deployment URL
        value: ${{ jobs.deploy.outputs.deployment-url }}
      widget-deployment-url:
        description: Cloudflare widget script URL
        value: ${{ jobs.deploy-widget.outputs.widget-deployment-url }}


jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.set-url.outputs.deployment-url || steps.set-staging-url.outputs.deployment-url || steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Apply D1 migrations
        if: ${{ inputs.run-migrations }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply pagescms --remote

      - name: Set BASE_URL for staging
        id: set-staging-url
        if: ${{ inputs.staging-deploy }}
        run: |
          URL="https://pagescms-staging.nocodemonkeys1.workers.dev"
          echo "BASE_URL=$URL" >> $GITHUB_ENV
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

      - name: Set BASE_URL for preview
        id: set-url
        if: ${{ inputs.preview-alias != '' }}
        run: |
          URL="https://${{ inputs.preview-alias }}-pagescms-staging.nocodemonkeys1.workers.dev"
          echo "BASE_URL=$URL" >> $GITHUB_ENV
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

      - name: Write secrets file for preview
        if: ${{ inputs.preview-alias != '' }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const secrets = {
            BASE_URL: process.env.BASE_URL,
            AUTH_PRODUCTION_URL: process.env.AUTH_PRODUCTION_URL,
            OAUTH_PROXY_SECRET: process.env.OAUTH_PROXY_SECRET,
            BETTER_AUTH_SECRET: process.env.BETTER_AUTH_SECRET,
            CRYPTO_KEY: process.env.CRYPTO_KEY,
            A_GITHUB_APP_PRIVATE_KEY: process.env.A_GITHUB_APP_PRIVATE_KEY,
            A_GITHUB_APP_CLIENT_SECRET: process.env.A_GITHUB_APP_CLIENT_SECRET,
            ADMIN_EMAILS: process.env.ADMIN_EMAILS,
            A_GITHUB_APP_ID: process.env.A_GITHUB_APP_ID,
            A_GITHUB_APP_NAME: process.env.A_GITHUB_APP_NAME,
            A_GITHUB_APP_CLIENT_ID: process.env.A_GITHUB_APP_CLIENT_ID,
            EMAIL_FROM: process.env.EMAIL_FROM,
            CACHE_CHECK_MIN: process.env.CACHE_CHECK_MIN,
            CONFIG_CHECK_MIN: process.env.CONFIG_CHECK_MIN,
            FILE_TTL_MIN: process.env.FILE_TTL_MIN,
            PERMISSIONS_TTL_MIN: process.env.PERMISSIONS_TTL_MIN,
            BRANCH_HEAD_TTL_MS: process.env.BRANCH_HEAD_TTL_MS,
            REPO_META_TTL_MS: process.env.REPO_META_TTL_MS,
            WEBHOOK_PUSH_INCREMENTAL_MAX_FILES: process.env.WEBHOOK_PUSH_INCREMENTAL_MAX_FILES,
            WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES: process.env.WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES,
          };
          fs.writeFileSync('wrangler-secrets.json', JSON.stringify(secrets));
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL || secrets.BASE_URL }}
          AUTH_PRODUCTION_URL: ${{ secrets.AUTH_PRODUCTION_URL || secrets.BASE_URL }}
          OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          A_GITHUB_APP_PRIVATE_KEY: ${{ secrets.A_GITHUB_APP_PRIVATE_KEY }}
          A_GITHUB_APP_CLIENT_SECRET: ${{ secrets.A_GITHUB_APP_CLIENT_SECRET }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          A_GITHUB_APP_ID: ${{ secrets.A_GITHUB_APP_ID }}
          A_GITHUB_APP_NAME: ${{ secrets.A_GITHUB_APP_NAME }}
          A_GITHUB_APP_CLIENT_ID: ${{ secrets.A_GITHUB_APP_CLIENT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          CACHE_CHECK_MIN: ${{ secrets.CACHE_CHECK_MIN }}
          CONFIG_CHECK_MIN: ${{ secrets.CONFIG_CHECK_MIN }}
          FILE_TTL_MIN: ${{ secrets.FILE_TTL_MIN }}
          PERMISSIONS_TTL_MIN: ${{ secrets.PERMISSIONS_TTL_MIN }}
          BRANCH_HEAD_TTL_MS: ${{ secrets.BRANCH_HEAD_TTL_MS }}
          REPO_META_TTL_MS: ${{ secrets.REPO_META_TTL_MS }}
          WEBHOOK_PUSH_INCREMENTAL_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_INCREMENTAL_MAX_FILES }}
          WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES }}

      - name: Deploy preview to Cloudflare Workers
        id: deploy-preview
        if: ${{ inputs.preview-alias != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --env staging --preview-alias ${{ inputs.preview-alias }} --secrets-file wrangler-secrets.json
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy staging to Cloudflare Workers
        id: deploy-staging
        if: ${{ inputs.staging-deploy && inputs.preview-alias == '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          environment: staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          secrets: |
            BASE_URL
            AUTH_PRODUCTION_URL
            OAUTH_PROXY_SECRET
            BETTER_AUTH_SECRET
            CRYPTO_KEY
            A_GITHUB_APP_PRIVATE_KEY
            A_GITHUB_APP_CLIENT_SECRET
            ADMIN_EMAILS
            A_GITHUB_APP_ID
            A_GITHUB_APP_NAME
            A_GITHUB_APP_CLIENT_ID
            EMAIL_FROM
            CACHE_CHECK_MIN
            CONFIG_CHECK_MIN
            FILE_TTL_MIN
            PERMISSIONS_TTL_MIN
            BRANCH_HEAD_TTL_MS
            REPO_META_TTL_MS
            WEBHOOK_PUSH_INCREMENTAL_MAX_FILES
            WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES
        env:
          BASE_URL: ${{ env.BASE_URL || secrets.BASE_URL }}
          AUTH_PRODUCTION_URL: ${{ secrets.AUTH_PRODUCTION_URL || secrets.BASE_URL }}
          OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          A_GITHUB_APP_PRIVATE_KEY: ${{ secrets.A_GITHUB_APP_PRIVATE_KEY }}
          A_GITHUB_APP_CLIENT_SECRET: ${{ secrets.A_GITHUB_APP_CLIENT_SECRET }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          A_GITHUB_APP_ID: ${{ secrets.A_GITHUB_APP_ID }}
          A_GITHUB_APP_NAME: ${{ secrets.A_GITHUB_APP_NAME }}
          A_GITHUB_APP_CLIENT_ID: ${{ secrets.A_GITHUB_APP_CLIENT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          CACHE_CHECK_MIN: ${{ secrets.CACHE_CHECK_MIN }}
          CONFIG_CHECK_MIN: ${{ secrets.CONFIG_CHECK_MIN }}
          FILE_TTL_MIN: ${{ secrets.FILE_TTL_MIN }}
          PERMISSIONS_TTL_MIN: ${{ secrets.PERMISSIONS_TTL_MIN }}
          BRANCH_HEAD_TTL_MS: ${{ secrets.BRANCH_HEAD_TTL_MS }}
          REPO_META_TTL_MS: ${{ secrets.REPO_META_TTL_MS }}
          WEBHOOK_PUSH_INCREMENTAL_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_INCREMENTAL_MAX_FILES }}
          WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES }}

      - name: Deploy production to Cloudflare Workers
        id: deploy
        if: ${{ !inputs.staging-deploy && inputs.preview-alias == '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          secrets: |
            BASE_URL
            AUTH_PRODUCTION_URL
            OAUTH_PROXY_SECRET
            BETTER_AUTH_SECRET
            CRYPTO_KEY
            A_GITHUB_APP_PRIVATE_KEY
            A_GITHUB_APP_CLIENT_SECRET
            ADMIN_EMAILS
            A_GITHUB_APP_ID
            A_GITHUB_APP_NAME
            A_GITHUB_APP_CLIENT_ID
            EMAIL_FROM
            CACHE_CHECK_MIN
            CONFIG_CHECK_MIN
            FILE_TTL_MIN
            PERMISSIONS_TTL_MIN
            BRANCH_HEAD_TTL_MS
            REPO_META_TTL_MS
            WEBHOOK_PUSH_INCREMENTAL_MAX_FILES
            WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES
        env:
          BASE_URL: ${{ env.BASE_URL || secrets.BASE_URL }}
          AUTH_PRODUCTION_URL: ${{ secrets.AUTH_PRODUCTION_URL || secrets.BASE_URL }}
          OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          A_GITHUB_APP_PRIVATE_KEY: ${{ secrets.A_GITHUB_APP_PRIVATE_KEY }}
          A_GITHUB_APP_CLIENT_SECRET: ${{ secrets.A_GITHUB_APP_CLIENT_SECRET }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          A_GITHUB_APP_ID: ${{ secrets.A_GITHUB_APP_ID }}
          A_GITHUB_APP_NAME: ${{ secrets.A_GITHUB_APP_NAME }}
          A_GITHUB_APP_CLIENT_ID: ${{ secrets.A_GITHUB_APP_CLIENT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          CACHE_CHECK_MIN: ${{ secrets.CACHE_CHECK_MIN }}
          CONFIG_CHECK_MIN: ${{ secrets.CONFIG_CHECK_MIN }}
          FILE_TTL_MIN: ${{ secrets.FILE_TTL_MIN }}
          PERMISSIONS_TTL_MIN: ${{ secrets.PERMISSIONS_TTL_MIN }}
          BRANCH_HEAD_TTL_MS: ${{ secrets.BRANCH_HEAD_TTL_MS }}
          REPO_META_TTL_MS: ${{ secrets.REPO_META_TTL_MS }}
          WEBHOOK_PUSH_INCREMENTAL_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_INCREMENTAL_MAX_FILES }}
          WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES }}

  deploy-widget:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      widget-deployment-url: ${{ steps.set-widget-url.outputs.widget-deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build widget
        run: pnpm build:widget

      - name: Set widget URL
        id: set-widget-url
        run: |
          if [ -n "${{ inputs.widget-worker-name }}" ]; then
            WORKER_NAME="${{ inputs.widget-worker-name }}"
          else
            WORKER_NAME="pagescms-widget"
          fi
          echo "widget-deployment-url=https://${WORKER_NAME}.nocodemonkeys1.workers.dev/pagescms-widget.js" >> $GITHUB_OUTPUT

      - name: Deploy widget to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/pagescms-widget
          command: deploy${{ inputs.widget-worker-name != '' && format(' --name {0}', inputs.widget-worker-name) || '' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
