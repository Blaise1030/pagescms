name: Deploy

on:
  workflow_call:
    inputs:
      worker-name:
        type: string
        default: ''
      run-migrations:
        type: boolean
        default: false
      environment:
        type: string
        default: ''
    outputs:
      deployment-url:
        description: Cloudflare deployment URL
        value: ${{ jobs.deploy.outputs.deployment-url }}


jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.set-url.outputs.deployment-url || steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Apply D1 migrations
        if: ${{ inputs.run-migrations }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply pagescms --remote

      - name: Set BASE_URL for preview
        id: set-url
        if: ${{ inputs.worker-name != '' }}
        run: |
          URL="https://${{ inputs.worker-name }}.nocodemonkeys1.workers.dev"
          echo "BASE_URL=$URL" >> $GITHUB_ENV
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy${{ inputs.worker-name != '' && format(' --name {0}', inputs.worker-name) || '' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          secrets: |
            BASE_URL
            BETTER_AUTH_SECRET
            CRYPTO_KEY
            A_GITHUB_APP_PRIVATE_KEY
            A_GITHUB_APP_CLIENT_SECRET
            ADMIN_EMAILS
            A_GITHUB_APP_ID
            A_GITHUB_APP_NAME
            A_GITHUB_APP_CLIENT_ID
            EMAIL_FROM
            CACHE_CHECK_MIN
            CONFIG_CHECK_MIN
            FILE_TTL_MIN
            PERMISSIONS_TTL_MIN
            BRANCH_HEAD_TTL_MS
            REPO_META_TTL_MS
            WEBHOOK_PUSH_INCREMENTAL_MAX_FILES
            WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES
        env:
          BASE_URL: ${{ env.BASE_URL || secrets.BASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          A_GITHUB_APP_PRIVATE_KEY: ${{ secrets.A_GITHUB_APP_PRIVATE_KEY }}
          A_GITHUB_APP_CLIENT_SECRET: ${{ secrets.A_GITHUB_APP_CLIENT_SECRET }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          A_GITHUB_APP_ID: ${{ secrets.A_GITHUB_APP_ID }}
          A_GITHUB_APP_NAME: ${{ secrets.A_GITHUB_APP_NAME }}
          A_GITHUB_APP_CLIENT_ID: ${{ secrets.A_GITHUB_APP_CLIENT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          CACHE_CHECK_MIN: ${{ secrets.CACHE_CHECK_MIN }}
          CONFIG_CHECK_MIN: ${{ secrets.CONFIG_CHECK_MIN }}
          FILE_TTL_MIN: ${{ secrets.FILE_TTL_MIN }}
          PERMISSIONS_TTL_MIN: ${{ secrets.PERMISSIONS_TTL_MIN }}
          BRANCH_HEAD_TTL_MS: ${{ secrets.BRANCH_HEAD_TTL_MS }}
          REPO_META_TTL_MS: ${{ secrets.REPO_META_TTL_MS }}
          WEBHOOK_PUSH_INCREMENTAL_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_INCREMENTAL_MAX_FILES }}
          WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES: ${{ secrets.WEBHOOK_PUSH_SCOPED_INVALIDATION_MAX_FILES }}
